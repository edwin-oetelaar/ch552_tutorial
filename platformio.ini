; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env:ch552]
platform = intel_mcs51
board = generic_8051

; Hardwarespecificaties voor de CH552
board_build.mcu = ch552t
board_build.f_cpu = 24000000L

; SDCC compiler-flags voor geheugenindeling (CH552 heeft 1KB xRAM)
build_flags = 
    --model-small
    --xram-size 1024
    --iram-size 256
    --code-size 14336

; Uploadtool configureren via de open-source tool 'vnproch55x' of 'wchisp'
upload_protocol = custom
upload_command = wchisp flash $SOURCE
